name: Data Refresh

on:
  schedule:
    - cron: "0 6 * * *"  # Daily 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Ingest external data
        run: python scripts/ingest_site_data.py
        env:
          NASA_POWER_BASE_URL: ${{ secrets.NASA_POWER_BASE_URL }}
          PVWATTS_API_KEY: ${{ secrets.PVWATTS_API_KEY }}
